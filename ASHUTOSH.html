<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PremiumShop PRO</title>

<style>
/* GLOBAL */
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial}
html{scroll-behavior:smooth}
body{background:#f5f5f7;color:#111;opacity:0;transition:1s}

/* HEADER */
header{position:sticky;top:0;z-index:1000;backdrop-filter:blur(10px);background:rgba(0,0,0,0.85);padding:15px 40px;display:flex;justify-content:space-between;align-items:center;color:white}
.logo{font-size:24px;font-weight:bold}
.nav-links a{color:white;margin:0 10px;text-decoration:none;font-weight:500}
.nav-links a:hover{color:#0af}
.search-box input{padding:7px 15px;border-radius:20px;border:none;outline:none}
.cart{font-size:20px;cursor:pointer;position:relative}
.cart-count{position:absolute;top:-8px;right:-10px;background:red;color:white;border-radius:50%;padding:2px 6px;font-size:12px}

/* HERO */
.hero{height:350px;background:linear-gradient(120deg,#0f2027,#203a43,#2c5364,#1f4037);background-size:400% 400%;animation:gradientMove 10s ease infinite;color:white;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center}
.hero h1{font-size:48px;animation:float 4s ease-in-out infinite}
@keyframes float{0%{transform:translateY(0)}50%{transform:translateY(-10px)}100%{transform:translateY(0)}}
@keyframes gradientMove{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}

/* PRODUCTS */
.products{padding:40px}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:25px}
.card{background:linear-gradient(145deg,#fff,#f0f0f0);border-radius:14px;padding:15px;text-align:center;cursor:pointer;transition:.4s;position:relative;overflow:hidden;box-shadow:0 5px 10px rgba(0,0,0,0.1)}
.card:hover{transform:translateY(-12px) scale(1.03);box-shadow:0 10px 25px rgba(0,0,0,0.2),0 0 15px rgba(0,113,227,0.4)}
.card img{width:100%;height:180px;object-fit:contain;border-radius:10px;transition:transform .5s}
.card:hover img{transform:scale(1.08)}
.price{color:#0071e3;font-weight:bold;margin:8px 0}
.rating{color:orange;font-size:14px}
.wishlist{position:absolute;top:10px;right:10px;font-size:18px;cursor:pointer}
.badge{position:absolute;top:10px;left:10px;background:green;color:white;font-size:12px;padding:2px 6px;border-radius:4px}
.card button{margin-top:8px;padding:8px 16px;border:none;background:#0071e3;color:white;border-radius:20px;cursor:pointer;transition:.3s}
.card button:hover{background:#005be4;transform:scale(1.05)}

/* MODAL */
.modal{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.6);display:none;align-items:center;justify-content:center;animation:fadeIn .4s;z-index:2000}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal-content{background:white;padding:30px;width:400px;border-radius:10px;text-align:center;animation:zoom .4s}
@keyframes zoom{from{transform:scale(.7)}to{transform:scale(1)}}
.modal img{width:100%;height:250px;object-fit:contain}

/* CART */
.cart-panel{position:fixed;right:-350px;top:0;width:300px;height:100%;background:white;padding:20px;transition:.4s;overflow:auto;box-shadow:-5px 0 20px rgba(0,0,0,0.2)}
.cart-panel.active{right:0}
.cart-item{display:flex;justify-content:space-between;margin-bottom:10px;border-bottom:1px solid #eee;padding-bottom:5px}

/* LOGIN */
.login-box{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:white;padding:30px;width:320px;display:none;box-shadow:0 5px 25px rgba(0,0,0,0.3);border-radius:15px}
.login-box input{width:100%;margin:8px 0;padding:10px;border-radius:10px;border:1px solid #ccc}
.login-box button{width:100%;padding:10px;background:#42a1ec;color:white;font-weight:bold;border:none;border-radius:25px;cursor:pointer}
</style>
</head>

<body>

<header>
<div class="logo">PremiumShop</div>
<div class="search-box">
<input id="search" placeholder="Search products">
</div>
<div class="cart" onclick="toggleCart()">🛒<span class="cart-count" id="cart-count">0</span></div>
<div><a href="#" onclick="showLogin()" style="color:white">Login</a></div>
</header>

<section class="hero">
<h1>Premium Online Store</h1>
<p>Only logged-in users can access products</p>
</section>

<section class="products">
<h2>Products</h2>
<div class="grid" id="grid"></div>
</section>

<div class="cart-panel" id="cartPanel">
<h3>Your Cart</h3>
<div id="cartItems"></div>
</div>

<div class="modal" id="modal"><div class="modal-content" id="modalContent"></div></div>

<div class="login-box" id="loginBox">
<h3>Login</h3>
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">
<button onclick="login()">Login</button>
</div>

<script>
// ================= LOGIN =================
function showLogin(){document.getElementById("loginBox").style.display="block";}
function login(){
  const email=document.getElementById("email").value;
  const pass=document.getElementById("password").value;
  if(!email || !pass){alert("Enter email and password"); return;}
  localStorage.setItem("user",email);
  alert("Login successful!");
  document.getElementById("loginBox").style.display="none";
  loadProducts();
}

// ================= CHECK LOGIN =================
if(!localStorage.getItem("user")){showLogin();} else {loadProducts();}

// ================= PRODUCTS =================
let products=[], cart=[];

async function loadProducts(){
  try{
    const res=await fetch("https://fakestoreapi.com/products");
    products=await res.json();
    displayProducts(products);
  }catch(e){alert("API error or no internet connection");}
}

const grid=document.getElementById("grid");
function displayProducts(list){
  grid.innerHTML="";
  list.forEach(p=>{
    grid.innerHTML+=`
    <div class="card" onclick="openProduct(${p.id})">
      <span class="badge">In Stock</span>
      <span class="wishlist">❤️</span>
      <img src="${p.image}">
      <h3>${p.title.substring(0,40)}</h3>
      <div class="rating">⭐ ${p.rating.rate}</div>
      <p class="price">₹${Math.floor(p.price*80)}</p>
      <button onclick="addCart(event,${p.id})">Buy</button>
    </div>`;
  });
}

// ================= MODAL =================
function openProduct(id){
  const p=products.find(x=>x.id==id);
  const modal=document.getElementById("modal");
  const content=document.getElementById("modalContent");
  content.innerHTML=`
    <img src="${p.image}">
    <h2>${p.title}</h2>
    <p>${p.description}</p>
    <h3>₹${Math.floor(p.price*80)}</h3>
    <button onclick="purchase(${p.id})">Purchase</button>
    <br><br>
    <button onclick="closeModal()">Close</button>
  `;
  modal.style.display="flex";
}
function closeModal(){document.getElementById("modal").style.display="none";}

// ================= CART =================
function addCart(e,id){e.stopPropagation();cart.push(products.find(p=>p.id==id));renderCart();}
function renderCart(){
  const box=document.getElementById("cartItems");
  box.innerHTML="";
  cart.forEach(p=>{box.innerHTML+=`<div class="cart-item"><span>${p.title.substring(0,20)}</span><span>₹${Math.floor(p.price*80)}</span></div>`;});
  document.getElementById("cart-count").innerText=cart.length;
}
function toggleCart(){document.getElementById("cartPanel").classList.toggle("active");}

// ================= PURCHASE =================
function purchase(id){
  if(!localStorage.getItem("user")){alert("Please login first");showLogin();return;}
  const p=products.find(x=>x.id==id);
  alert("Order placed for "+p.title);
}

// ================= SEARCH =================
document.getElementById("search").addEventListener("keyup",function(){
  const v=this.value.toLowerCase();
  displayProducts(products.filter(p=>p.title.toLowerCase().includes(v)));
});

// ================= PAGE LOAD =================
window.addEventListener("load",()=>{document.body.style.opacity="1";});
</script>

</body>
</html>
